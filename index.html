<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>TorQ Industrial Dashboard</title>
    <style>
      body {
        background: #0d0d0d;
        color: #fff;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        padding: 20px;
        background: #1a1a1a;
        border-radius: 20px;
        border: 1px solid #333;
      }
      .box {
        padding: 20px;
        border-radius: 12px;
        background: #262626;
        border: 1px solid #444;
      }
      h1 {
        color: #ff6b00;
        margin: 0;
        font-size: 1.2rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">
        <h1>Panel de Control</h1>
        <p>Estado: Sistema Activo</p>
      </div>
    </div>
  </body>
</html>
